<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Configuración - Tenant CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <!-- PWA Meta Tags -->
<link rel="manifest" href="/site.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Tenant CRM">
<meta name="theme-color" content="#2563eb">
<meta name="mobile-web-app-capable" content="yes">

<!-- iOS Icons -->
<link rel="apple-touch-icon" href="/icons/icon-192x192.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-192x192.png">

<!-- Windows Tiles -->
<meta name="msapplication-TileColor" content="#2563eb">
<meta name="msapplication-TileImage" content="/icons/icon-144x144.png">
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-lg sticky top-0 z-10">
        <div class="px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <button id="menuBtn" class="text-gray-600 hover:text-gray-900 focus:outline-none">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                    <h1 class="text-xl font-bold text-gray-800 ml-3 md:ml-0">Configuración</h1>
                </div>
                <button id="notificationsBtn" class="text-gray-600 hover:text-gray-900 relative p-2 rounded-lg hover:bg-gray-100 transition">
                    <i class="fas fa-bell text-xl"></i>
                    <span id="notificationBadge" class="notification-badge absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full h-5 min-w-[20px] px-1 flex items-center justify-center hidden">0</span>
                </button>
                <button id="logoutBtn" class="bg-red-50 text-red-600 px-3 py-2 rounded-lg text-sm hover:bg-red-100">
                    <i class="fas fa-sign-out-alt mr-1"></i>
                    <span class="hidden sm:inline">Salir</span>
                </button>
            </div>
        </div>
    </nav>

    <div id="sidebar" class="fixed inset-0 z-20 hidden">
        <!-- Same sidebar structure -->
        <div class="absolute inset-0 bg-gray-600 bg-opacity-75" id="sidebarOverlay"></div>
        <div class="absolute left-0 top-0 bottom-0 w-64 bg-white shadow-xl">
            <div class="p-4 border-b">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-semibold">Menú</h2>
                    <button id="closeSidebarBtn" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
            </div>
            <div class="p-4">
                <ul class="space-y-2">
                    <li><a href="/dashboard.html" class="block p-3 hover:bg-gray-50 rounded-lg"><i class="fas fa-home mr-3"></i>Dashboard</a></li>
                    <li><a href="/tenants.html" class="block p-3 hover:bg-gray-50 rounded-lg"><i class="fas fa-users mr-3"></i>Inquilinos</a></li>
                    <li><a href="/contracts.html" class="block p-3 hover:bg-gray-50 rounded-lg"><i class="fas fa-file-contract mr-3"></i>Contratos</a></li>
                    <li>
                        <a href="/payments.html" class="flex items-center p-3 hover:bg-gray-50 rounded-lg text-gray-700 hover:text-blue-600 transition">
                            <i class="fas fa-dollar-sign w-6"></i>
                            <span>Pagos</span>
                        </a>
                    </li>
                    <li><a href="/settings.html" class="block p-3 bg-blue-50 text-blue-600 rounded-lg"><i class="fas fa-cog mr-3"></i>Configuración</a></li>
                    <li><a href="/reports.html" class="flex items-center p-3 hover:bg-gray-50 rounded-lg text-gray-700 hover:text-blue-600">
                        <i class="fas fa-chart-bar w-6"></i><span>Reportes</span>
                    </a></li>
                </ul>
            </div>
        </div>
    </div>

    <main class="p-4 max-w-4xl mx-auto">
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
            <h2 class="text-lg font-semibold mb-6">Configuración del Sistema</h2>
            
            <div class="space-y-6">
                <!-- Email Configuration -->
                <div class="border-b pb-6">
                    <h3 class="text-md font-medium mb-4 flex items-center">
                        <i class="fas fa-envelope mr-2 text-blue-600"></i>
                        Configuración de Email
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Remitente</label>
                            <input type="email" id="emailFrom" value="notificaciones@tenantcrm.com" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Firma del Email</label>
                            <textarea id="emailSignature" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg">Atentamente,
Equipo de Gestión</textarea>
                        </div>
                    </div>
                </div>

                <!-- Default Values -->
                <div class="border-b pb-6">
                    <h3 class="text-md font-medium mb-4 flex items-center">
                        <i class="fas fa-percent mr-2 text-blue-600"></i>
                        Valores por Defecto
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Comisión Agente (%)</label>
                            <input type="number" id="defaultCommission" value="5" step="0.1" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Frecuencia Aumento (meses)</label>
                            <input type="number" id="defaultIncreaseFrequency" value="12" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        </div>
                    </div>
                </div>

                <!-- Database Status -->
                <div>
                    <h3 class="text-md font-medium mb-4 flex items-center">
                        <i class="fas fa-database mr-2 text-blue-600"></i>
                        Estado de la Base de Datos
                    </h3>
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <div class="flex items-center justify-between">
                            <span class="text-sm text-gray-600">Conexión a Neon:</span>
                            <span class="text-sm text-green-600 font-medium flex items-center">
                                <i class="fas fa-circle text-xs mr-2"></i>Conectado
                            </span>
                        </div>
                        <div class="mt-2 text-xs text-gray-500">
                            Última sincronización: <span id="lastSync">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/notifications.js"></script>
    <script src="/js/pwa.js"></script>
    <script src="/js/settings.js"></script>
</body>
</html>
