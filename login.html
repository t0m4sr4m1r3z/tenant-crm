<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Tenant CRM - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="/js/tailwind-config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <!-- PWA Meta Tags -->
<link rel="icon" type="image/png" href="/icons/icon-192x192.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Tenant CRM">
<meta name="theme-color" content="#4f46e5">
<meta name="mobile-web-app-capable" content="yes">

<!-- iOS Icons -->
<link rel="apple-touch-icon" href="/icons/icon-192x192.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-192x192.png">

<!-- Windows Tiles -->
<meta name="msapplication-TileColor" content="#4f46e5">
<meta name="msapplication-TileImage" content="/icons/icon-144x144.png">
</head>
<body class="bg-gradient-to-br from-surface-dark to-slate-900 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Background Decor -->
    <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-primary-600/20 rounded-full mix-blend-screen filter blur-[100px] opacity-50 animate-pulse-slow"></div>
    <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-purple-600/20 rounded-full mix-blend-screen filter blur-[100px] opacity-50 animate-pulse-slow" style="animation-delay: 1.5s"></div>

    <div class="max-w-md w-full space-y-8 glass-card p-10 rounded-3xl shadow-2xl animate-fade-in relative z-10">
        <div class="text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-primary-500 to-purple-600 mb-4 shadow-neon">
                <i class="fas fa-building text-2xl text-white"></i>
            </div>
            <h1 class="text-3xl font-display font-bold text-white mb-2 tracking-tight">Tenant CRM</h1>
            <p class="text-slate-400 text-sm font-medium">Gestión Profesional de Inquilinos</p>
        </div>
        
        <form id="loginForm" class="mt-8 space-y-6">
            <div class="space-y-5">
                <div class="group">
                    <label for="username" class="block text-sm font-medium text-slate-300 mb-1.5 ml-1 transition-colors group-focus-within:text-primary-400">
                        <i class="fas fa-user text-slate-500 group-focus-within:text-primary-400 mr-2 transition-colors"></i>Usuario
                    </label>
                    <input type="text" id="username" name="username" required 
                           class="w-full px-5 py-3.5 bg-slate-800/40 border border-slate-700/50 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-all text-base text-white placeholder-slate-500 hover:bg-slate-800/60"
                           placeholder="Ingresa tu usuario">
                </div>
                <div class="group">
                    <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5 ml-1 transition-colors group-focus-within:text-primary-400">
                        <i class="fas fa-lock text-slate-500 group-focus-within:text-primary-400 mr-2 transition-colors"></i>Contraseña
                    </label>
                    <input type="password" id="password" name="password" required 
                           class="w-full px-5 py-3.5 bg-slate-800/40 border border-slate-700/50 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-all text-base text-white placeholder-slate-500 hover:bg-slate-800/60"
                           placeholder="Ingresa tu contraseña">
                </div>
            </div>

            <div id="errorMessage" class="text-red-400 bg-red-900/20 border border-red-900/50 p-3 rounded-lg text-sm text-center hidden animate-fade-in"></div>

            <button type="submit" 
                    class="w-full bg-gradient-to-r from-primary-600 to-primary-500 text-white py-3.5 px-4 rounded-xl hover:from-primary-500 hover:to-primary-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 focus:ring-offset-slate-900 transition-all transform hover:-translate-y-0.5 hover:shadow-neon text-base font-semibold tracking-wide flex justify-center items-center group">
                <i class="fas fa-sign-in-alt mr-2 group-hover:translate-x-1 transition-transform"></i>Iniciar Sesión
            </button>
        </form>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const errorDiv = document.getElementById('errorMessage');
            
            if (loginForm) {
                loginForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;
                    
                    // Mostrar loading
                    const submitBtn = loginForm.querySelector('button[type="submit"]');
                    const originalText = submitBtn.innerHTML;
                    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Verificando...';
                    submitBtn.disabled = true;
                    
                    try {
                        // Llamar a la función serverless
                        const response = await fetch('/.netlify/functions/auth', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ username, password })
                        });
                        
                        const data = await response.json();
                        
                        if (data.success) {
                            // Guardar datos de sesión
                            localStorage.setItem('authToken', data.token);
                            localStorage.setItem('user', JSON.stringify(data.user));
                            
                            // Redirigir al dashboard
                            window.location.href = 'dashboard.html';
                        } else {
                            errorDiv.textContent = data.message || 'Error al iniciar sesión';
                            errorDiv.classList.remove('hidden');
                        }
                    } catch (error) {
                        console.error('Error:', error);
                        errorDiv.textContent = 'Error de conexión. Intenta de nuevo.';
                        errorDiv.classList.remove('hidden');
                    } finally {
                        // Restaurar botón
                        submitBtn.innerHTML = originalText;
                        submitBtn.disabled = false;
                    }
                });
            }
        });
        </script>
        <script src="/js/pwa.js"></script>
</body>
</html>
