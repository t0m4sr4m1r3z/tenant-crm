[build]
  functions = "netlify/functions"
  publish = "."

# Headers para PWA y caché
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Redirects para SPA (Single Page Application)
[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/tenants"
  to = "/tenants.html"
  status = 200

[[redirects]]
  from = "/contracts"
  to = "/contracts.html"
  status = 200

[[redirects]]
  from = "/payments"
  to = "/payments.html"
  status = 200

[[redirects]]
  from = "/reports"
  to = "/reports.html"
  status = 200

[[redirects]]
  from = "/settings"
  to = "/settings.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

# API redirects
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Fallback para páginas no encontradas
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404