<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Inquilinos - Tenant CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <!-- PWA Meta Tags -->
<link rel="manifest" href="/site.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Tenant CRM">
<meta name="theme-color" content="#2563eb">
<meta name="mobile-web-app-capable" content="yes">

<!-- iOS Icons -->
<link rel="apple-touch-icon" href="/icons/icon-192x192.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-192x192.png">

<!-- Windows Tiles -->
<meta name="msapplication-TileColor" content="#2563eb">
<meta name="msapplication-TileImage" content="/icons/icon-144x144.png">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation Bar (same as dashboard) -->
    <nav class="bg-white shadow-lg sticky top-0 z-10">
        <div class="px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <button id="menuBtn" class="text-gray-600 hover:text-gray-900 focus:outline-none">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                    <h1 class="text-xl font-bold text-gray-800 ml-3 md:ml-0">Inquilinos</h1>
                </div>
                <div class="flex items-center space-x-3">
                    <button id="notificationsBtn" class="text-gray-600 hover:text-gray-900 relative p-2 rounded-lg hover:bg-gray-100 transition">
                        <i class="fas fa-bell text-xl"></i>
                        <span id="notificationBadge" class="notification-badge absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full h-5 min-w-[20px] px-1 flex items-center justify-center hidden">0</span>
                    </button>
                    <button id="logoutBtn" class="bg-red-50 text-red-600 px-3 py-2 rounded-lg text-sm hover:bg-red-100">
                        <i class="fas fa-sign-out-alt mr-1"></i>
                        <span class="hidden sm:inline">Salir</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <div id="sidebar" class="fixed inset-0 z-20 hidden">
        <!-- Same sidebar structure as dashboard -->
        <div class="absolute inset-0 bg-gray-600 bg-opacity-75" id="sidebarOverlay"></div>
        <div class="absolute left-0 top-0 bottom-0 w-64 bg-white shadow-xl">
            <div class="p-4 border-b">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-semibold">Menú</h2>
                    <button id="closeSidebarBtn" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
            </div>
            <div class="p-4">
                <ul class="space-y-2">
                    <li><a href="/dashboard.html" class="block p-3 hover:bg-gray-50 rounded-lg"><i class="fas fa-home mr-3"></i>Dashboard</a></li>
                    <li><a href="/tenants.html" class="block p-3 bg-blue-50 text-blue-600 rounded-lg"><i class="fas fa-users mr-3"></i>Inquilinos</a></li>
                    <li><a href="/contracts.html" class="block p-3 hover:bg-gray-50 rounded-lg"><i class="fas fa-file-contract mr-3"></i>Contratos</a></li>
                    <li>
                        <a href="/payments.html" class="flex items-center p-3 hover:bg-gray-50 rounded-lg text-gray-700 hover:text-blue-600 transition">
                            <i class="fas fa-dollar-sign w-6"></i>
                            <span>Pagos</span>
                        </a>
                    </li>
                    <li><a href="/settings.html" class="block p-3 hover:bg-gray-50 rounded-lg"><i class="fas fa-cog mr-3"></i>Configuración</a></li>
                    <li><a href="/reports.html" class="flex items-center p-3 hover:bg-gray-50 rounded-lg text-gray-700 hover:text-blue-600">
                        <i class="fas fa-chart-bar w-6"></i><span>Reportes</span>
                    </a></li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="p-4 max-w-7xl mx-auto">
        <!-- Header with Add Button -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
            <div class="relative w-full sm:w-64">
                <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchTenants" placeholder="Buscar inquilinos..." 
                       class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm">
            </div>
            <button id="addTenantBtn" class="w-full sm:w-auto bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 flex items-center justify-center gap-2">
                <i class="fas fa-plus"></i>
                <span>Nuevo Inquilino</span>
            </button>
        </div>

        <!-- Tenants Table -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">DNI</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nombre</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Teléfono</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tenantsTableBody" class="bg-white divide-y divide-gray-200">
                        <!-- JS will populate this -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add/Edit Tenant Modal -->
    <div id="tenantModal" class="fixed inset-0 z-30 hidden">
        <div class="absolute inset-0 bg-gray-600 bg-opacity-75"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="bg-white rounded-xl shadow-xl max-w-md w-full max-h-[90vh] overflow-y-auto">
                <div class="p-6">
                    <h3 class="text-lg font-semibold mb-4" id="modalTitle">Nuevo Inquilino</h3>
                    <form id="tenantForm" class="space-y-4">
                        <input type="hidden" id="tenantId">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">DNI</label>
                            <input type="text" id="tenantDni" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre Completo</label>
                            <input type="text" id="tenantName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input type="email" id="tenantEmail" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
                            <input type="tel" id="tenantPhone" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Dirección</label>
                            <input type="text" id="tenantAddress" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="flex gap-3 pt-4">
                            <button type="button" id="closeModalBtn" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">Cancelar</button>
                            <button type="submit" class="flex-1 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/notifications.js"></script>
    <script src="/js/pwa.js"></script>
    <script src="/js/tenants.js"></script>
</body>
</html>
